<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>ФАРМ АУРА</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(145deg, #1a1e1b 0%, #2d3329 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      padding: 15px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(200,200,200,0.08) 0%, transparent 60%),
                  radial-gradient(circle at 70% 60%, rgba(180,180,180,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .game-container {
      position: relative;
      z-index: 10;
      max-width: 520px;
      width: 100%;
      background: rgba(20, 20, 17, 0.9);
      backdrop-filter: blur(18px);
      border-radius: 40px 40px 35px 35px;
      padding: 25px 20px 35px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.85);
      border: 1px solid rgba(210, 180, 80, 0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-family: 'Impact', sans-serif;
      color: #e6d7a8;
      text-shadow: 0 0 15px #b8942e;
      font-size: 2.6rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      text-align: center;
    }

    .aura-score {
      background: #0a0c09;
      border: 2px solid #c9a53b;
      border-radius: 50px;
      padding: 10px 25px;
      margin: 10px 0 18px;
      box-shadow: 0 0 30px #b8860b;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .aura-label { color: #ddc07a; font-weight: bold; font-size: 1.35rem; }
    .aura-value { font-size: 3.4rem; font-weight: 800; color: #f9e076; text-shadow: 0 0 25px #ffb300; }

    .tom-area {
      position: relative;
      cursor: pointer;
      margin: 12px 0 8px;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .tom-area:active { transform: scale(0.95); }

    .tom-image {
      width: 100%;
      max-width: 280px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.75);
    }

    .cigar-smoke-container {
      position: absolute;
      top: 35%;
      right: 15%;
      pointer-events: none;
      z-index: 5;
    }
    .cigar { font-size: 2.4rem; transform: rotate(-25deg); color: #b87c4b; }
    .smoke { font-size: 1.8rem; animation: floatSmoke 2.6s infinite ease-in-out; color: #d6d6d6; }
    .smoke:nth-child(2) { animation-delay: 0.5s; font-size: 2.1rem; }
    .smoke:nth-child(3) { animation-delay: 1.1s; font-size: 1.6rem; }

    @keyframes floatSmoke {
      0%   { transform: translate(0,0) scale(0.7); opacity: 0.85; }
      50%  { transform: translate(18px,-32px) scale(1.55); opacity: 0.45; }
      100% { transform: translate(38px,-58px) scale(2.1); opacity: 0; }
    }

    .bob-squad {
      display: flex;
      gap: 18px;
      margin: 25px 0 22px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .creepy-face {
      width: 92px;
      height: 92px;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 12px 25px rgba(0,0,0,0.7);
      animation: march 0.85s infinite alternate ease-in-out;
      border: 3px solid #2d2a1c;
    }
    .creepy-face:nth-child(2) { animation-delay: 0.12s; }
    .creepy-face:nth-child(3) { animation-delay: 0.28s; }
    .creepy-face:nth-child(4) { animation-delay: 0.42s; }

    @keyframes march {
      0%   { transform: translateY(0) rotate(-3deg); }
      100% { transform: translateY(-12px) rotate(3deg); }
    }

    .click-hint {
      color: #f5e7b3;
      font-size: 1.25rem;
      font-weight: bold;
      margin-top: 12px;
      background: rgba(0,0,0,0.75);
      padding: 8px 24px;
      border-radius: 30px;
      font-family: 'Impact', sans-serif;
    }

    .reset-btn {
      background: rgba(70,60,30,0.9);
      border: 1px solid #c9a53b;
      color: #f7e5a1;
      padding: 14px 32px;
      border-radius: 40px;
      margin-top: 15px;
      font-size: 1.15rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>ФАРМ АУРА</h1>
    
    <div class="aura-score">
      <span class="aura-label">АУРА</span>
      <span class="aura-value" id="auraDisplay">0</span>
    </div>

    <div class="tom-area" id="tomClickZone">
      <img class="tom-image" src="photo_2026-05-23_02-07-52.jpg" alt="Tom">
      
      <div class="cigar-smoke-container">
        <span class="smoke">💨</span><span class="smoke">💨</span><span class="smoke">💨</span>
        <span class="cigar">🚬</span>
      </div>
    </div>

    <div class="click-hint"> YARA YARA YA </div>

    <div class="bob-squad">
      <img class="creepy-face" src="photo_2026-05-23_02-07-47.jpg" alt="bob">
      <img class="creepy-face" src="photo_2026-05-23_02-07-47.jpg" alt="bob">
      <img class="creepy-face" src="photo_2026-05-23_02-07-47.jpg" alt="bob">
      <img class="creepy-face" src="photo_2026-05-23_02-07-47.jpg" alt="bob">
    </div>

    <button class="reset-btn" id="resetButton"> Сбросить ауру</button>
  </div>

  <script>
    let aura = 0;
    const auraDisplay = document.getElementById('auraDisplay');
    const tomZone = document.getElementById('tomClickZone');
    const resetBtn = document.getElementById('resetButton');

    // Загрузка сохранённой ауры
    try {
      const saved = localStorage.getItem('farmAuraYara');
      if (saved) aura = parseInt(saved);
    } catch(e){}

    function updateDisplay() {
      auraDisplay.textContent = aura;
    }

    function saveAura() {
      try { localStorage.setItem('farmAuraYara', aura); } catch(e){}
    }

    function addAura() {
      aura++;
      updateDisplay();
      saveAura();
      auraDisplay.style.transform = 'scale(1.25)';
      setTimeout(() => auraDisplay.style.transform = 'scale(1)', 140);
    }

    function resetAura() {
      aura = 0;
      updateDisplay();
      saveAura();
    }

    tomZone.addEventListener('click', (e) => {
      addAura();
      // Эффект +1
      const plus = document.createElement('div');
      plus.textContent = '+1';
      plus.style.position = 'absolute';
      plus.style.left = (e.offsetX || 100) + 'px';
      plus.style.top = (e.offsetY || 100) + 'px';
      plus.style.color = '#f9e076';
      plus.style.fontSize = '2rem';
      plus.style.fontWeight = 'bold';
      plus.style.pointerEvents = 'none';
      plus.style.animation = 'floatPlus 0.9s forwards';
      tomZone.appendChild(plus);
      setTimeout(() => plus.remove(), 900);
    });

    const style = document.createElement('style');
    style.textContent = `@keyframes floatPlus { 0% {opacity:1; transform:translateY(0)} 100% {opacity:0; transform:translateY(-60px) scale(1.6)} }`;
    document.head.appendChild(style);

    resetBtn.addEventListener('click', resetAura);
    updateDisplay();
  </script>
</body>
</html>
